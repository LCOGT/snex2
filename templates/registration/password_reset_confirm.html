{% extends 'tom_common/base.html' %}
{% load bootstrap4 %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="row justify-content-md-center">
  <div class="col-md-4">

    <h3 class="text-center">Set a new password</h3>

    <form method="POST">
      {% csrf_token %}
      {% bootstrap_form form %}

      {% buttons %}
      <button type="submit" class="btn btn-primary btn-block">
        Change password
      </button>
      {% endbuttons %}
    </form>

  </div>
</div>
{% endblock %}
