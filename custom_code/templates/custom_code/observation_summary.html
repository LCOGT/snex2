{% for parameter in parameters %}
<div class="row"><b>{{ parameter.title }}:</b></div>
<div class="row">{{ parameter.summary }}</div>
{% for comment in parameter.comments %}
<div class="row">{{ comment }}</div>
{% endfor %}
<div class="row align-items-center mt-2 mb-3">
  <div class="col-auto">
    <a class="btn btn-outline-primary btn-sm" href="{% url 'custom_code:observationgroup-detail' parameter.group %}">Track This Sequence</a>
  </div>
  {% if is_active %}
  <div class="col-auto" style="margin-left: 14rem;">
    <button type="button" id="cancel-btn-{{ parameter.observation }}" class="btn btn-outline-danger btn-sm" onclick="stopSequence({{ parameter.observation }})">Stop Sequence</button>
  </div>
  {% endif %}
</div>
{% empty %}
{% if not is_active %}
  <div class="row">No observations yet for this target.</div>
{% endif %}
{% endfor %}
<br>
<script>
function stopSequence(observationId) {
  var button = document.getElementById('cancel-btn-' + observationId);
  var oldText = button.innerHTML;
  var cancelComment = prompt('Reason for stopping observations:', '');
  if (cancelComment === null) {
    return;
  }
  button.innerHTML = 'Loading...';
  var comment = {'cancel': cancelComment};
  var commentJSON = JSON.stringify(comment);
  $.ajax({
    url: '{% url "custom_code:observation-sequence-cancel" %}',
    data: {
      'pk': observationId,
      'comment': commentJSON
    },
    dataType: 'json',
    success: function(response) {
      if (response.success === 'Stopped') {
        button.innerHTML = 'Stopped';
      } else if (response.failure) {
        alert(response.failure);
        button.innerHTML = oldText;
      } else {
        button.innerHTML = oldText;
      }
    },
    error: function() {
      alert('Request failed.');
      button.innerHTML = oldText;
    }
  });
}
</script>
