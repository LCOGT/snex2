{% load bootstrap4 custom_code_tags %}
<button type="button" title="Add paper information for this target" class="btn"
        style="background-color: white; color: #174460; border-color: #174460;"
        data-toggle="modal" data-target="#addPaperModal">
  Add Paper
</button>

<div class="modal fade" id="addPaperModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Add Paper</h5>
        <button type="button" class="close" data-dismiss="modal">
          <span>&times;</span>
        </button>
      </div>
      <div class="modal-body">
        <form class="form" action="{% url 'custom_code:create-paper' %}" method="post">
          {% csrf_token %}
          {% bootstrap_form form %}
          {% buttons %}
          <button type="submit" class="btn btn-primary">Submit</button>
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          {% endbuttons %}
        </form>
      </div>
    </div>
  </div>
</div>
