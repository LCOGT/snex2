{% load bootstrap4 custom_code_tags %}
{% for item in papers %}
<div id="paper_{{ item.paper.id }}" style="padding-top: 1px; padding-bottom: 1px;">
  <span style="font-size: medium; color: #004459;">{{ item.paper }}</span><br>
  <span style="font-size: medium; color: #004459;">{{ item.paper.description }}</span><br>
  <span style="font-size: small; color: #0089b3">{{ item.paper.created }}</span><br>
  <button type="button"
          class="btn btn-sm btn-outline-secondary"
          style="margin-top: 4px;"
          data-toggle="modal"
          data-target="#editPaperModal-{{ item.paper.id }}">
    Edit
  </button>
  <div class="modal fade" id="editPaperModal-{{ item.paper.id }}" tabindex="-1" role="dialog">
    <div class="modal-dialog" role="document">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Edit Paper</h5>
          <button type="button" class="close" data-dismiss="modal">
            <span>&times;</span>
          </button>
        </div>
        <div class="modal-body">
          <form method="post" action="{% url 'custom_code:update-paper' item.paper.id %}">
            {% csrf_token %}
            {% bootstrap_form item.edit_form %}
            {% buttons %}
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
            {% endbuttons %}
          </form>
          <form method="post" action="{% url 'custom_code:delete-paper' item.paper.id %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger"
                    onclick="return confirm('Are you sure you want to delete this paper?')">
              Delete
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endfor %}
