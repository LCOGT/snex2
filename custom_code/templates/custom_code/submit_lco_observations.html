{% load bootstrap4 crispy_forms_tags observation_extras targets_extras custom_code_tags static cache %}
<style>
.border-right {
    border-right: 1px solid black;
}
#div_phot_groups {
    overflow-y: scroll;
    width: 250px;
    height: 250px;
}
#div_spec_groups {
    overflow-y: scroll;
    width: 250px;
    height: 250px;
}
#div_phot_delay_amount {
    display: none;
}
#div_spec_delay_amount {
    display: none;
}
#div_phot_retry_until_obtained {
    display: none;
}
#div_spec_retry_until_obtained {
    display: none;
}
</style>
<div class="row">
  <div class="col-md-6">
    {% airmass_plot %}
  </div>
  <div class="col-md-6">
    {% moon_vis object %}
  </div>
</div>
<div class="row">
  <div class="col-md-6 border-right">
    <h4>Submit a Photometry Sequence</h4>
    {% crispy phot_form %}
  </div>
  <div class="col-md-6">
    <h4>Submit a Spectroscopy Sequence</h4>
    {% crispy spec_form %}
  </div>
</div>
<script>
$(function () {
  const $instType = $("#phot_instrument_type");
  const config = {
    '1M0-SCICAM-SINISTRO': {
      show: ['U', 'B', 'V', 'R', 'I', 'up', 'gp', 'rp', 'ip', 'zs', 'w'],
      defaults: {'U': 300, 'B': 200, 'V': 120, 'gp': 200, 'rp': 120, 'ip': 120}
    },
    '0M4-SCICAM-QHY600': {
      show: ['B', 'V', 'up', 'gp', 'rp', 'ip', 'zs', 'w'],
      defaults: {'B': 200, 'V': 120, 'gp': 200, 'rp': 120, 'ip': 120}
    },
    '2M0-SCICAM-MUSCAT': {
      show: ['muscat_filter'],
      defaults: {'muscat_filter': 200}
    }
  };

  function updateVisibility() {
    const val = $instType.val();
    const settings = config[val];
    $("[id^='row_']").hide();
    $("#all-filters-div [id$='_0']").val(0);
    $("#all-filters-div [id$='_1']").val(2);
    $("#all-filters-div [id$='_2']").val(1);
    if (settings) {
      settings.show.forEach(f => $(`#row_${f}`).show());
      for (let f in settings.defaults) {
        $(`#phot_${f}_0`).val(settings.defaults[f]);
      }
    }
    if (val === '2M0-SCICAM-MUSCAT') {
      $('#block-no-header').hide();
      $('#exp-time-header, #exp-num-header').removeClass('col-md-4').addClass('col-md-6');
      $("[id$='_2']").hide();
      $("[id$='_2']").closest('div.col-md-4, .col').hide();
    } else {
      $('#block-no-header').show();
      $('#exp-time-header, #exp-num-header').removeClass('col-md-6').addClass('col-md-4');
      $("[id$='_2']").show();
      $("[id$='_2']").closest('div.col-md-4, .col').show();
    }
  }

  function recalcReminder(prefix) {
    var cadence = parseFloat(document.getElementById(prefix + "_cadence_frequency_value").value);
    var cadence_unit = document.getElementById(prefix + "_cadence_frequency_unit").value;
    if (isNaN(cadence)) {
      return;
    }
    if (cadence_unit === 'hours') {
      cadence = cadence / 24;
    }
    var delayamount = parseFloat(document.getElementById(prefix + "_delay_amount").value);
    if (isNaN(delayamount)) {
      delayamount = 0;
    }
    var newreminder = 2 * cadence + delayamount + 0.7;
    document.getElementById(prefix + "_reminder").value = newreminder;
  }

  function updateDelayVisibility(prefix) {
    var isChecked = $("#" + prefix + "_delay_start").is(":checked");
    if (isChecked) {
      $("#div_" + prefix + "_delay_amount").show();
    } else {
      $("#div_" + prefix + "_delay_amount").hide();
      $("#" + prefix + "_delay_amount").val(0);
      recalcReminder(prefix);
    }
  }

  function updateRetryVisibility(prefix) {
    var strategy = $("#" + prefix + "_cadence_strategy").val();
    if (strategy === 'SnexRetryUntilDeadlineStrategy') {
      $("#div_" + prefix + "_retry_until_obtained").show();
    } else {
      $("#div_" + prefix + "_retry_until_obtained").hide();
      $("#" + prefix + "_retry_until_obtained").prop("checked", false);
    }
  }

  $instType.on('change', updateVisibility);
  updateVisibility();

  $("#phot_cadence_frequency_value").on("keyup change", function() {
    recalcReminder("phot");
  });
  $("#phot_cadence_frequency_unit").on("change", function() {
    recalcReminder("phot");
  });
  $("#phot_delay_amount").on("keyup change", function() {
    recalcReminder("phot");
  });

  $("#spec_cadence_frequency_value").on("keyup change", function() {
    recalcReminder("spec");
  });
  $("#spec_cadence_frequency_unit").on("change", function() {
    recalcReminder("spec");
  });
  $("#spec_delay_amount").on("keyup change", function() {
    recalcReminder("spec");
  });

  $("#phot_delay_start").on("change", function() {
    updateDelayVisibility("phot");
  });
  $("#spec_delay_start").on("change", function() {
    updateDelayVisibility("spec");
  });

  $("#phot_cadence_strategy").on("change", function() {
    updateRetryVisibility("phot");
  });
  $("#spec_cadence_strategy").on("change", function() {
    updateRetryVisibility("spec");
  });

  updateDelayVisibility("phot");
  updateDelayVisibility("spec");
  updateRetryVisibility("phot");
  updateRetryVisibility("spec");
});
</script>
