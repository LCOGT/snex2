{% load bootstrap4 crispy_forms_tags observation_extras targets_extras custom_code_tags static cache %}
<style>
.border-right {
    border-right: 1px solid black;
}
#div_phot_groups {
    overflow-y: scroll;
    width: 250px;
    height: 250px;
}
#div_spec_groups {
    overflow-y: scroll;
    width: 250px;
    height: 250px;
}
#div_phot_delay_amount {
    display: none;
}
#div_spec_delay_amount {
    display: none;
}
#div_phot_retry_until_obtained {
    display: none;
}
#div_spec_retry_until_obtained {
    display: none;
}
</style>

<div class="row">
  <div class="col-md-6">
    {% airmass_plot %}
  </div>
  <div class="col-md-6">
    {% moon_vis object %}
  </div>
</div>

<div class="row">
  <div class="col-md-6 border-right">
    <h4>Submit a Photometry Sequence</h4>
    {% crispy phot_form %}
  </div>
  <div class="col-md-6">
    <h4>Submit a Spectroscopy Sequence</h4>
    {% crispy spec_form %}
  </div>
</div>

<script>
$(function () {
  const $instType = $("#phot_instrument_type");
  const config = {
    '1M0-SCICAM-SINISTRO': {
      show: ['U', 'B', 'V', 'R', 'I', 'up', 'gp', 'rp', 'ip', 'zs', 'w'],
      defaults: {'U': 300, 'B': 200, 'V': 120, 'gp': 200, 'rp': 120, 'ip': 120}
    },
    '0M4-SCICAM-QHY600': {
      show: ['B', 'V', 'up', 'gp', 'rp', 'ip', 'zs', 'w'],
      defaults: {'B': 200, 'V': 120, 'gp': 200, 'rp': 120, 'ip': 120}
    },
    '2M0-SCICAM-MUSCAT': {
      show: ['muscat_filter'],
      defaults: {'muscat_filter': 200}
    }
  };

  function updateVisibility() {
    const val = $instType.val();
    const settings = config[val];
    $("[id^='row_']").hide();
    $("#all-filters-div [id$='_0']").val(0);
    $("#all-filters-div [id$='_1']").val(2);
    $("#all-filters-div [id$='_2']").val(1);

    if (settings) {
      settings.show.forEach(f => $(`#row_${f}`).show());
      for (let f in settings.defaults) {
        $(`#phot_${f}_0`).val(settings.defaults[f]);
      }
    }

    if (val === '2M0-SCICAM-MUSCAT') {
      $('#block-no-header').hide();
      $('#exp-time-header, #exp-num-header').removeClass('col-md-4').addClass('col-md-6');
      $("[id$='_2']").hide();
      $("[id$='_2']").closest('div.col-md-4, .col').hide();
    } else {
      $('#block-no-header').show();
      $('#exp-time-header, #exp-num-header').removeClass('col-md-6').addClass('col-md-4');
      $("[id$='_2']").show();
      $("[id$='_2']").closest('div.col-md-4, .col').show();
    }
  }

  function recalcReminder(prefix) {
    let cadence = parseFloat($(`#${prefix}_cadence_frequency_value`).val());
    const cadenceUnit = $(`#${prefix}_cadence_frequency_unit`).val();
    const delayAmount = parseFloat($(`#${prefix}_delay_amount`).val()) || 0;

    if (isNaN(cadence)) {
      return;
    }

    if (cadenceUnit === 'hours') {
      cadence = cadence / 24;
    }

    const newReminder = 2 * cadence + delayAmount + 0.7;
    $(`#${prefix}_reminder`).val(newReminder);
  }

  function toggleDelay(prefix) {
    const delayAmount = document.getElementById(`div_${prefix}_delay_amount`);
    if (delayAmount.style.display === "block") {
      delayAmount.style.display = "none";
    } else {
      delayAmount.style.display = "block";
    }
  }

  function toggleRetryCheckbox(prefix) {
    const strategy = $(`#${prefix}_cadence_strategy`).val();
    const $checkboxDiv = $(`#div_${prefix}_retry_until_obtained`);
    const $checkbox = $(`#${prefix}_retry_until_obtained`);

    if (strategy === 'SnexRetryUntilDeadlineStrategy') {
      $checkboxDiv.show();
    } else {
      $checkboxDiv.hide();
      $checkbox.prop('checked', false);
    }
  }

  $instType.on('change', updateVisibility);
  updateVisibility();

  $("#phot_cadence_frequency_value").on('keyup change', function() {
    recalcReminder('phot');
  });
  $("#phot_cadence_frequency_unit").change(function() {
    recalcReminder('phot');
  });
  $("#phot_delay_amount").keyup(function() {
    recalcReminder('phot');
  });
  $("#phot_delay_start").click(function() {
    toggleDelay('phot');
  });

  $("#spec_cadence_frequency_value").on('keyup change', function() {
    recalcReminder('spec');
  });
  $("#spec_cadence_frequency_unit").change(function() {
    recalcReminder('spec');
  });
  $("#spec_delay_amount").keyup(function() {
    recalcReminder('spec');
  });
  $("#spec_delay_start").click(function() {
    toggleDelay('spec');
  });

  $("#phot_cadence_strategy").change(function() {
    toggleRetryCheckbox('phot');
  });
  $("#spec_cadence_strategy").change(function() {
    toggleRetryCheckbox('spec');
  });

  toggleRetryCheckbox('phot');
  toggleRetryCheckbox('spec');
});
</script>
