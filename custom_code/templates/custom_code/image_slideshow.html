{% load bootstrap4 static %}
<div class="row" style="padding-top: 50px;">
  <div class="col-md-2">
    <div class="row">
      <div class="col-md-6"><b>Telescope: </b></div>
      <div class="col-md-6" id="thumb-telescope">{{ telescope }}</div>
    </div>
    <div class="row">
      <div class="col-md-6"><b>Instrument: </b></div>
      <div class="col-md-6" id="thumb-instrument">{{ instrument }}</div>
    </div>
    <div class="row">
      <div class="col-md-6"><b>Filter: </b></div>
      <div class="col-md-6" id="thumb-filter">{{ filter }}</div>
    </div>
    <div class="row">
      <div class="col-md-6"><b>Exptime: </b></div>
      <div class="col-md-6" id="thumb-exptime">{{ exptime }}</div>
    </div>
  </div>
  <div class="col-md-8">
    <div class="row" id="form-thumbnail">
      <button class="btn" id="previous-img" style="font-size: 20px;" onclick="prevImg()">&laquo; Previous</button>
      <img id="form-img" style="width: 70%; height: 70%; margin-left: 5px; margin-top: 5px;" src="data:image/png;base64,{{ thumb }}" alt="img">
      <button class="btn" id="next-img" style="font-size: 20px; display: none;" onclick="nextImg()">Next &raquo;</button>
    </div>
    <div class="row justify-content-center mt-3">
      <input type="hidden" id="download-filename" name="filename">
      <button type="button" class="btn btn-primary" onclick="downloadFile(event)">Download Fits</button>
    </div>
    <div class="row justify-content-center mt-3">
      <button type="button" class="btn btn-primary" onclick="downloadAll(event)">Download All Images</button>
    </div>
    <div class="row justify-content-center mt-2">
      <div id="download-status" class="text-center"></div>
    </div>
  </div>
  <div class="col-md-2">
    <form>
      {% bootstrap_form form %}
    </form>
  </div>
</div>
<script>
  var zoom = document.getElementById("id_zoom");
  zoom.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      makeThumbnail();
    }
  });
  var sigma = document.getElementById("id_sigma");
  sigma.addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      makeThumbnail();
    }
  });
  var filename = document.getElementById("id_filenames");
  filename.addEventListener("change", function (e) {
    if (filename.selectedIndex === filename.options.length - 1) {
      document.getElementById("previous-img").style.display = "none";
      document.getElementById("next-img").style.display = "block";
    } else if (filename.selectedIndex === 0) {
      document.getElementById("previous-img").style.display = "block";
      document.getElementById("next-img").style.display = "none";
    } else {
      document.getElementById("previous-img").style.display = "block";
      document.getElementById("next-img").style.display = "block";
    }
    makeThumbnail();
  });

  function makeThumbnail() {
    var zoomVal = document.getElementById("id_zoom").value;
    var sigmaVal = document.getElementById("id_sigma").value;
    var filenameVal = document.getElementById("id_filenames").value;
    document.getElementById("download-filename").value = filenameVal;
    $.ajax({
      url: '{% url "make-thumbnail" %}',
      data: {'zoom': zoomVal,
             'sigma': sigmaVal,
             'filenamedict': filenameVal
      },
      dataType: 'json',
      success: function(response) {
        var thumb = response.thumb;
        document.getElementById("form-img").src = thumb;
        $('#thumb-telescope').html(response.telescope);
        $('#thumb-instrument').html(response.instrument);
        $('#thumb-filter').html(response.filter);
        $('#thumb-exptime').html(response.exptime);
      }
    });
  };

  function prevImg() {
    var select = document.getElementById("id_filenames");
    if (select.selectedIndex === select.options.length - 2) {
      select.selectedIndex++;
      document.getElementById("previous-img").style.display = "none";
      document.getElementById("next-img").style.display = "block";
    } else {
      select.selectedIndex++;
      document.getElementById("next-img").style.display = "block";
    }
    makeThumbnail();
  };

  function nextImg() {
    var select = document.getElementById("id_filenames");
    if (select.selectedIndex === 1) {
      select.selectedIndex--;
      document.getElementById("next-img").style.display = "none";
      document.getElementById("previous-img").style.display = "block";
    } else {
      select.selectedIndex--;
      document.getElementById("previous-img").style.display = "block";
    }
    makeThumbnail();
  };

  async function downloadFile(event) {
    event.preventDefault();
    const downloadButton = document.querySelector("button[onclick='downloadFile(event)']");
    const filenameVal = document.getElementById("id_filenames").value;
    const fileData = JSON.parse(filenameVal);
    const finalFilename = fileData.filename + '.fits';

    const originalButtonText = downloadButton.innerHTML;
    downloadButton.innerHTML = "Downloading...";
    downloadButton.disabled = true;

    const response = await fetch(`{% url 'download-fits' %}?filename=${encodeURIComponent(filenameVal)}`);
    const blob = await response.blob();

    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.style.display = 'none';
    a.href = url;
    a.download = finalFilename;
    document.body.appendChild(a);
    a.click();
    window.URL.revokeObjectURL(url);
    document.body.removeChild(a);

    downloadButton.innerHTML = originalButtonText;
    downloadButton.disabled = false;
  }
  document.addEventListener("DOMContentLoaded", function() {
    const filenameSelect = document.getElementById("id_filenames");
    const hiddenInput = document.getElementById("download-filename");
    hiddenInput.value = filenameSelect.value;
    makeThumbnail();
  });
  async function downloadAll(event) {
    event.preventDefault();
    const button = document.querySelector("button[onclick='downloadAll(event)']");
    const status = document.getElementById('download-status');
    const originalText = button.innerHTML;
    button.disabled = true;
    button.innerHTML = 'Searching for frames...';
    status.innerHTML = '<span class="spinner-border spinner-border-sm" role="status"></span> Querying archive...';
    try {
      const getResp = await fetch('{% url "get-frame-ids" %}?target_id={{ target.id }}');
      const response = await getResp.json();
      const frameIds = response.frame_ids;
      const count = response.count;
      const batchSize = 500;
      const batches = [];
      for (let i = 0; i < frameIds.length; i += batchSize) {
          batches.push(frameIds.slice(i, i + batchSize));
      }
      const totalBatches = batches.length;

      status.innerHTML = `<span style="color: green;">&#x2713; Found ${count} frames. Starting ${totalBatches} parallel downloads...</span>`;
      button.innerHTML = 'Downloading...';

      for (let i = 0; i < totalBatches; i++) {
        const iframe = document.createElement('iframe');
        iframe.name = `download-iframe-${i}`;
        iframe.style.display = 'none';
        document.body.appendChild(iframe);

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '{% url "download-zip" %}';
        form.target = `download-iframe-${i}`;
        form.style.display = 'none';

        const csrfInput = document.createElement('input');
        csrfInput.type = 'hidden';
        csrfInput.name = 'csrfmiddlewaretoken';
        csrfInput.value = '{{ csrf_token }}';
        form.appendChild(csrfInput);

        const frameIdsInput = document.createElement('input');
        frameIdsInput.type = 'hidden';
        frameIdsInput.name = 'frame_ids';
        frameIdsInput.value = JSON.stringify(batches[i]);
        form.appendChild(frameIdsInput);

        const targetNameInput = document.createElement('input');
        targetNameInput.type = 'hidden';
        targetNameInput.name = 'target_name';
        targetNameInput.value = `{{ target.name }}_part${i + 1}`;
        form.appendChild(targetNameInput);

        document.body.appendChild(form);
        form.submit();
        document.body.removeChild(form);
        await new Promise(r => setTimeout(r, 500));
      }

      status.innerHTML = `<span style="color: green;">&#x2713; ${totalBatches} downloads started — check your downloads folder.</span>`;
      button.innerHTML = originalText;
      button.disabled = false;

    } catch(e) {
      console.error('Error:', e);
      status.innerHTML = `<span style="color: red;">&#x2715; Error: ${e.message}</span>`;
      button.innerHTML = originalText;
      button.disabled = false;
    }
  }
</script>
